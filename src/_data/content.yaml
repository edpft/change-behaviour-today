hero:
  intro: 'I offer Cognitive Behavioural Therapy to people experiencing depression and anxiety disorders. I specialise in treating trauma, low self-esteem, and perinatal distress.'

how_i_work:
  intro: 'I use cognitive behavioural therapy, or CBT, to help people identify the unhelpful behaviours and thoughts preventing them from moving forward. My therapy is a collaborative and transparent process in which I work with the client to help them find the answers to their problem. I believe that by the end of treatment a person should be equipped with the skills to act as their own therapist and manage whatever setbacks they may encounter.'
  therapies:
    - 'Cognitive Behavioural Therapy'
    - 'Couples Therapy for Depression'
    - 'Acceptance and Commitment Therapy'
    - 'Compassion Focused Therapy'
    - 'Clinical Supervision'
  getting_started_paras:
    - 'I begin therapy with an assessment session to discuss the problem in detail and explore ways in which CBT may be helpful. Following the assessment, I start by offering six sessions of CBT and then review.'
    - 'Each session will last 50 minutes.'
    - 'The average number of sessions people require is usually between eight and fifteen sessions depending on the presenting problem.'

