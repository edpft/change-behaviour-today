name: CI

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.js'
      - 'postcss.config.js'
  workflow_run:
    workflows: ['Process images']
    types: [completed]
    branches: [main]

jobs:
  test:
    if: >
      github.event_name == 'push' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Validate content
        run: npm test

      - name: Build
        run: npm run build

      - name: Verify build output
        run: npm run test:build

      - name: Validate HTML
        run: npm run validate:html

      - name: Test accessibility (axe)
        run: npm run test:a11y

      - name: Install lychee
        uses: taiki-e/install-action@v2
        with:
          tool: lychee

      - name: Check links
        run: npm run validate:links

      - name: Lighthouse CI
        run: npm run lighthouse
