name: Process images

on:
  push:
    branches: [main]
    paths:
      - 'images/**'

permissions:
  contents: write

jobs:
  process-images:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Process images
        run: node process-images.js images

      - name: Commit processed images
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/*.avif src/*.webp src/*.jpeg src/*.jpg
          git diff --staged --quiet || git commit -m "build: process images from /images [skip images]"
          git push
