[build]
  command = "npm test && npm run build && npm run test:build"
  publish = "dst"

[build.environment]
  NODE_VERSION = "22"

[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "script-src 'self' https://identity.netlify.com; object-src 'none'; base-uri 'none';"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

[[headers]]
  for = "/admin/*"
  [headers.values]
    Content-Security-Policy = "script-src 'self' https://identity.netlify.com https://unpkg.com; object-src 'none'; base-uri 'none';"
